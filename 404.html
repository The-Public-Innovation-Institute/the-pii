<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>The Public Innovation Institute</title>
<!--
  GitHub Pages has no server-side router, so a direct/shared link to e.g.
  /research/some-slug returns a real 404 unless we redirect it here first.
  This encodes the intended path into a query string and sends the visitor
  to index.html, which decodes it back into a real URL (see the inline
  script in index.html's <head>) before the app boots.
  Technique: https://github.com/rafgraph/spa-github-pages
-->
<script>
  var l = window.location;
  l.replace(
    l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
    "/?/" +
    l.pathname.slice(1).replace(/&/g, "~and~") +
    (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
    l.hash
  );
</script>
</head>
<body></body>
</html>
