  programs:[
    {id:"piixcyvl-2026",name:"PII × Cyvl Summer Innovation Program",level:"Featured",format:"Fully virtual · 6 weeks",status:"open",deadline:"June 22, 2026",applyUrl:"https://qualtricsxm8mlnyrfr9.qualtrics.com/jfe/form/SV_5vCcqh60Nl5ksZw",featured:true,description:"A six-week partnership with Cyvl pairing real infrastructure data with public policy training for students ready to build something that matters.",fullDescription:"PII and Cyvl are partnering to drive public-benefit innovation. Cities sit on mountains of data about crumbling infrastructure, aging roads, heat indices, 311 calls, housing and public health challenges, environment and climate, and stretched budgets — but most have no idea what to do with it. Cyvl uses AI, LiDAR sensors, and 360° imagery to give governments a real-time picture of what's falling apart and what to fix first. PII researches and builds the tools governments use to act on that picture. This program is a chance to help figure out what happens next.\n\nWeek one is fast, focused coursework on the tools and frameworks participants need: data and public policy, how to evaluate programs that work (and ones that don't), and the real ethics of AI in government. Weeks two through six are spent working directly on an innovation project at the intersection of data, AI, and public impact — genuine challenges real cities face, with real data and real stakes.\n\nCyvl provides participants access to real-world infrastructure datasets and works directly alongside them, offering mentorship and a technical workshop. Students use natural language tools and AI-assisted workflows to explore how cities can prioritize maintenance, improve safety, and allocate public resources more effectively.\n\n**Structure:**\n- Week one: 1.5 hours in the morning and 1.5 hours in the afternoon, with exact timing set by group consensus\n- Weeks two through six: a weekly check-in for individuals and teams, plus a two-hour Friday group session\n\n**This is for you if:**\n- You're an undergrad, grad student, or recent grad who gets genuinely fired up about cities, data, and who actually benefits from technology\n- You want experience that means something, not just a summer of observation\n- You're curious what happens when AI meets public infrastructure, equity, and government decision-making\n- You're ready to learn fast alongside people just as driven as you are\n\n**Why participate:**\n- Interdisciplinary training that blends advanced data analytics, innovation, and public policy design\n- A hands-on, real-world policy project rather than a simulation\n- Guidance from faculty at top academic institutions and active practitioners across sectors\n- Broadened policy literacy across the social, technical, and civic dimensions of a public problem\n- A stronger portfolio and clearer path toward roles in research, civic innovation, or public leadership\n\n**Key information:**\n- Applications open: May 8, 2026\n- Applications close: June 22, 2026\n- Program period: July 13 – August 21, 2026\n\nThe program is free, fully virtual, and open to undergraduates, graduate students, and recent graduates from anywhere in the world — no specific major required. Participants in the Boston and Cambridge area will have opportunities to engage in person; everyone else gets the full experience virtually. Those who complete the program receive a certificate of achievement, along with a real project, a network of peers and practitioners, and experience worth talking about in interviews and applications."},
    {id:"data-social-innovation",name:"Data, Social Innovation, & Public Policy",level:"Graduate",format:"Virtual · 8 weeks",status:"open",deadline:"March 10, 2026",applyUrl:"https://www.thepii.org/application-dsipp",featured:false,description:"An interdisciplinary summer program for students using data to tackle housing insecurity, public health, environmental justice, and workforce equity.",fullDescription:"Data is not just about numbers — it's about lives, choices, and the power to design more just systems. This program equips students not just to analyze the world, but to change it, with tools grounded in evidence and guided by purpose.\n\nData, Social Innovation, & Public Policy is a rigorous, interdisciplinary summer experience for undergraduate and graduate students interested in leveraging data to address society's most pressing challenges, from housing insecurity and public health to environmental justice and workforce equity. It's an evolution of PII's original Health, Technology, & Society program, reimagined to span the full spectrum of social policy issues where data and innovation play a role.\n\nThe eight-week virtual program opens with two weeks of intensive seminars and foundational skill-building, followed by a real-world policy project developed in collaboration with the Data-Smart City Solutions program at Harvard University — the basis for each student's final capstone. Students choose between two tracks: a Data Analytics track applying tools from GIS to real-time sensor data, or a Policy Analysis track evaluating public programs and designing new interventions.\n\n**Coursework topics include:**\n- Data, Economics, & Public Policy\n- Program Design and Evaluation in the Public Sector\n- Research Methods\n- Ethics of AI, Technology & Society\n- A weekly seminar on Data, Technology, & Society\n\nThroughout the program, students engage directly with civic leaders, policymakers, and technologists working at the forefront of data-driven governance. Each cohort includes roughly 15 participants; those who show exceptional commitment to research may continue their projects beyond the summer under faculty supervision.\n\n**Program structure:**\n- Weeks 1–2: daily virtual sessions — a 1.5-hour morning session with foundational lectures and a 1-hour afternoon session of policy exercises\n- Weeks 3–8: teams set their own meeting cadence, with weekly check-ins with the Data-Smart City Solutions team and Friday seminars with the institute\n\n**Why enroll:**\n- An immersive, interdisciplinary program blending data analytics, social innovation, and public policy design\n- A real-world policy project with the Data-Smart City Solutions initiative at Harvard, culminating in a capstone and publication\n- Mentorship from faculty at top academic institutions and practitioners from city governments, multilateral agencies, and mission-driven organizations\n- A broadened view of social policy that expands your literacy and impact potential\n- A compelling portfolio and stronger positioning for roles in research, civic innovation, or public leadership\n\n**Key information:**\n- Applications open: January 15, 2026\n- Applications close: March 10, 2026\n- Program period: June 1 – July 24, 2026\n\nThe program is free and open to enrolled undergraduate and graduate students with an interest in data-informed policy and social innovation. Basic familiarity with data analysis, economics, or public policy is helpful but not required; writing and communication experience is strongly preferred. Graduates leave with a professional-level policy publication, a certificate of achievement, and a portfolio element that strengthens graduate school or policy-sector applications."},
    {id:"data-analytics-urban-policy",name:"Data Analytics & Urban Policy",level:"Undergraduate",format:"Semester + summer placement",status:"open",deadline:"December 12, 2025",applyUrl:"https://www.thepii.org/application-daup",featured:false,description:"A semester of analytical training followed by a summer placement inside a city government department, working on real urban policy challenges.",fullDescription:"Urban data tells stories of transit delays, rent burdens, heatwaves, and inequity. To shape a city is to understand those stories, which requires seeing the signal in the noise.\n\nLaunching in Spring 2026, Data Analytics & Urban Policy is an intensive semester-plus-summer opportunity for current undergraduate and graduate students, as well as recent graduates within two years of their graduation date, who want to use data to make cities work better for everyone. The program combines rigorous technical training with real-world public service experience inside city governments.\n\nParticipants begin with a virtual semester-long phase focused on core analytical tools, spatial methods, and responsible data use in government, meeting one day a week for two hours. The coursework then transitions into a municipal placement — working directly inside a city office or department such as housing, transportation, public health, or innovation, alongside city staff on applied projects. This placement work forms the basis of each student's capstone, presented at the program's conclusion to public officials, data leaders, and peers.\n\n**Program highlights:**\n- Hands-on coursework in data analysis, causal inference, spatial analytics, and civic tech\n- A real-world placement in a city department for the summer\n- Mentorship from city officials and policy experts\n- A capstone project built on the municipal placement work\n- A final showcase with feedback from urban policy leaders\n\n**Key topics include:**\n- Urban Data Analysis & Visualization\n- Causal Inference for Policy\n- Ethics of Data Use in Government\n- Open Data & Civic Technology\n- Spatial Analysis and Mapping Inequality\n- Microeconomic Theory and Public Policy\n\nThis is not a simulation — participants work on real datasets, tackle real civic problems, and contribute to ongoing policy work in U.S. cities.\n\n**Key information:**\n- Applications open: October 6, 2025\n- Applications close: December 12, 2025\n- Interviews: January 5–7, 2026\n- Notifications: January 13, 2026\n- First day: February 13, 2026\n\nThe program is free and welcomes students and recent graduates with interests in data science, public policy, economics, computer science, or urban studies, as well as humanities students with an analytical background. Roughly 12 students are admitted per cohort. Program structure: a spring semester of weekly Friday virtual sessions, followed by a summer municipal placement matched to student interests and city needs."},
    {id:"public-innovation-fellowship",name:"Public Innovation Fellowship",level:"Fellowship",format:"Year-long",status:"open",deadline:"TBD",applyUrl:"#",featured:false,description:"A year-long fellowship for researchers and practitioners who design, test, and evaluate solutions to public problems across PII's focus areas.",fullDescription:"Where evidence meets the street, change begins. Fellows turn noise into knowledge and knowledge into public goods that last.\n\nThe Public Innovation Fellowship is a year-long program for researchers and practitioners who design, test, and evaluate solutions to public problems across PII's six focus areas: Global and Public Health; Education and Workforce Innovation; Climate and Environment; Economic Transformation; Civic and Digital Infrastructure; and Data and Responsible AI. Fellows work closely with faculty, municipal, community, and industry partners to translate rigorous research into deployable policy and technology.\n\nOver the academic year, fellows build a clear problem definition, assemble the relevant datasets and evidence base, and develop implementable interventions with defined equity and performance metrics. The program combines a methods studio — causal inference, geospatial analysis, standards, and responsible AI — with a practice seminar involving city and agency mentors. Each fellow produces a Public Innovation Dossier: a policy brief, implementation plan, open methods, and an evaluation framework, culminating in a pilot or decision-ready proposal for a partner organization.\n\n**Who should apply:**\n- Come from interdisciplinary backgrounds — public health, economics, computer science, urban planning, law, design, policy, or operations\n- Want to move beyond theory into real-world implementation, engaging directly with communities, agencies, and partner organizations\n- Are motivated to apply rigorous quantitative and qualitative methods to public problems\n- Care about equity and designing interventions that are inclusive, measurable, and tailored to underserved populations\n- Can commit to a full year of seminar work, mentorship, data gathering, evaluation, and producing a decision-ready proposal or pilot\n\n**Why apply:**\n- Translate evidence into policy and practice, not just study public problems\n- Build mastery of causal inference, geospatial analysis, and responsible AI within a supportive studio environment\n- Work closely with academic, municipal, community, and industry mentors\n- Produce a Public Innovation Dossier — a real portfolio item for employers, funders, or partner agencies\n- Join a community of fellows across all six focus areas for peer learning and cross-cutting collaboration\n- Contribute to durable institutional change intended for use by real policymakers and organizations\n\nApplications for the 2026–2027 academic year open in November. The fellowship welcomes applicants with training or experience relevant to public problem-solving; prior policy or field experience is a plus but not required. Selection is competitive, weighing strength of idea, clarity of approach, feasibility, equity focus, methodological rigor, and alignment with PII's focus areas."},
    {id:"tech-innovation-entrepreneurship",name:"Technology, Innovation & Entrepreneurship",level:"High School",format:"Summer · In-person",status:"open",deadline:"TBD",applyUrl:"#",featured:false,description:"An immersive introduction to civic technology and public entrepreneurship for exceptional high school students aged 15–18.",fullDescription:"A two-week residential program for high school students who want to understand how technology shapes cities and communities.\n\nStudents learn design thinking, basic coding, and the fundamentals of building for public good. Each cohort completes a civic technology prototype by the end of the program."}

  hyperion:{tagline:"Venture Development Program",body:"Hyperion provides intensive support for early-stage ventures combining cutting-edge technology with deep understanding of complex social systems.",cta:"Apply to Hyperion",editorialImage:"",editorialImageAlt:"Hyperion founders at work",dates:[{label:"Applications Open",date:"October 12, 2025"},{label:"Applications Close",date:"February 20, 2026"},{label:"Notifications",date:"March 2, 2026"},{label:"Program Start",date:"March 23, 2026"}],eligibility:{body1:"Hyperion supports early-stage founders — those at the idea to pre-seed stage — building bold, public-interest ventures that engage complex civic, social, or environmental challenges.",body2:"We are looking for teams currently based in the U.S. who understand that successful ventures in this space must account for regulatory complexity, public procurement, systems-level impact, and the needs of diverse stakeholders from day one.",criteria:["Seek to build scalable solutions that serve the public good","Benefit from deep networks of research institutions, government partners, and investors","Thrive in a collaborative, mission-driven founder community","Value rigor, humility, and cross-sector fluency","Want to build with the public, not just for it"]},pillars:[{num:"01",title:"Embedded Research Support",body:"Institutional partnerships across MIT, Harvard, and beyond."},{num:"02",title:"Founder Community",body:"A curated cohort of founders tackling public problems with bold ideas."},{num:"03",title:"Procurement Pathways",body:"Access to policymakers, pilots, and government procurement channels."},{num:"04",title:"Capital & Advisor Network",body:"Warm introductions to impact investors and philanthropies."}],partners:[{name:"JP Morgan",type:"Financial Partner",color:"#003087",logo:""},{name:"Fusion Fund",type:"Venture Partner",color:"#0e0e0c",logo:""},{name:"Orrick",type:"Legal Partner",color:"#1a1a1a",logo:""},{name:"MIT",type:"Academic Partner",color:"#A31F34",logo:""},{name:"City of San José",type:"Government Partner",color:"#0D4F8B",logo:""},{name:"City of Baltimore",type:"Government Partner",color:"#002147",logo:""}]},
  conference:{year:"2026",date:"May 2026",location:"New York City",theme:"Urban.Next: Inventing the Future of Urban Systems",subtitle:"The conference on public-interest innovation and invention. Bringing together researchers, city leaders, technologists, and civic entrepreneurs.",regUrl:"#",tracks:[{name:"The Summit",desc:"Plenaries, keynotes, and provocations from the field's leading voices"},{name:"The Workshops",desc:"Hands-on sessions co-designed with city innovators and practitioners"}]},
  cailPosts:[
    {id:"cail-launch-2026",type:"article",title:"Launching City as Innovation Lab: Our Vision for Urban Testbeds",author:"Khahlil Louisy",date:"June 19, 2026",status:"published",excerpt:"CAIL is PII\u2019s new initiative to partner with cities and companies to design, test, and scale solutions in real-world urban environments.",body:"Cities are no longer just the subjects of innovation \u2014 they are its laboratories.\n\nToday, The Public Innovation Institute formally launches City as Innovation Lab (CAIL), an initiative designed to turn cities into structured testbeds where new solutions are co-developed with civic leaders, tested against real problems, evaluated rigorously, and scaled across city networks.\n\nUrban challenges \u2014 climate resilience, infrastructure modernization, digital transformation, public health, mobility \u2014 require more than good ideas. They demand real-world testing, robust research, and cross-sector collaboration.\n\n**What CAIL does:**\n- Partners cities with companies and researchers to deploy pilots\n- Measures outcomes with independent, rigorous evaluation\n- Builds governance and financing pathways for long-term adoption\n- Shares lessons across a global network of participating cities\n\nIf you are a city leader, company, or research organization interested in participating, we\u2019d love to hear from you.",featured:true},
    {id:"cail-forum-sept-2026",type:"event",title:"CAIL Urban Innovation Forum \u2014 September 2026",author:"The PII",date:"September 15, 2026",status:"published",excerpt:"A half-day convening for city leaders, companies, and researchers exploring the future of urban testbeds. Cambridge, MA.",body:"Join us for the inaugural CAIL Urban Innovation Forum, a half-day convening at the intersection of civic need and private sector innovation.\n\n**Date:** September 15, 2026\n**Location:** Harvard Kennedy School, Cambridge, MA\n**Format:** Panels, roundtables, and working sessions\n\nThe forum will bring together city CIOs, innovation officers, technology companies, and researchers to explore how cities can structure innovation partnerships that actually deliver measurable outcomes.\n\n**Agenda highlights:**\n- Opening keynote: The city as a platform for public-interest innovation\n- Panel: Lessons from the first generation of civic AI deployments\n- Roundtable: What cities need from companies (and vice versa)\n- Workshop: Designing a pilot that\u2019s built to scale\n\nRegistration opens July 2026. Contact info@thepii.org to express interest.",featured:true}
  ],
  team:[

function mergeById(defaults, saved){
  if(!saved || !saved.length) return defaults;
  const savedIds = new Set(saved.map(x=>x.id));
  const missingFromSaved = defaults.filter(d=>!savedIds.has(d.id));
  return [...missingFromSaved, ...saved];
}

function mergeWithDefaults(parsed){
  if(!parsed) return DEFAULT_DATA;
  return {...DEFAULT_DATA,...parsed,
    research:mergeById(DEFAULT_DATA.research,parsed.research),
    programs:parsed.programs||DEFAULT_DATA.programs,
    carousel:parsed.carousel||DEFAULT_DATA.carousel,
    cailPosts:parsed.cailPosts||DEFAULT_DATA.cailPosts,
    team:parsed.team||DEFAULT_DATA.team,
    opportunities:parsed.opportunities||DEFAULT_DATA.opportunities,
    hyperion:{...DEFAULT_DATA.hyperion,...(parsed.hyperion||{}),partners:(parsed.hyperion&&parsed.hyperion.partners)||DEFAULT_DATA.hyperion.partners,dates:(parsed.hyperion&&parsed.hyperion.dates)||DEFAULT_DATA.hyperion.dates,eligibility:{...DEFAULT_DATA.hyperion.eligibility,...((parsed.hyperion&&parsed.hyperion.eligibility)||{})}},
    affiliations:parsed.affiliations||DEFAULT_DATA.affiliations,
    about:{...DEFAULT_DATA.about,...(parsed.about||{})},
    editorialImages:{...DEFAULT_DATA.editorialImages,...(parsed.editorialImages||{})},
    pageHeroes:{...DEFAULT_DATA.pageHeroes,...(parsed.pageHeroes||{})},
    site:{...DEFAULT_DATA.site,...(parsed.site||{})}
  };
}
// Local cache read synchronously so the page paints instantly on repeat
// visits, rather than waiting on a network round trip first.
function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw) return mergeWithDefaults(JSON.parse(raw));
  }catch(e){}
  return DEFAULT_DATA;
}
// Fetches the shared content row from Supabase — this is what makes edits
// made in the CMS from any device/location show up for every visitor,
// instead of each browser only ever seeing its own local cache.
async function fetchRemoteData(){
  try{
    const {data,error} = await sbClient.from('pii_site_content').select('data').eq('id','main').maybeSingle();
    if(error||!data||!data.data) return null;
    try{localStorage.setItem(STORAGE_KEY, JSON.stringify(data.data));}catch(e){}
    return mergeWithDefaults(data.data);
  }catch(e){
    return null;
  }
}

function formatInline(str){
  return str
    .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g,'$1<em>$2</em>');
}
function BodyText({text}){
  if(!text)return null;
  // Posts authored with the CMS's rich text editor store real HTML — render directly.
  if(/^\s*</.test(text)){
    return h("div",{className:"rte-body",dangerouslySetInnerHTML:{__html:text}});
  }
  // Legacy posts store lightweight markdown — parse it as before.
  return h("div",null,text.split("\n\n").map((para,i)=>{
    const trimmed=para.trim();
    const imgMatch=trimmed.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if(imgMatch){
      const alt=imgMatch[1],src=imgMatch[2];
      return h("figure",{key:i,style:{margin:"1.8rem 0"}},
        h("img",{src,alt,style:{width:"100%",height:"auto",display:"block",border:`1px solid ${RULE}`}}),
        alt&&h("figcaption",{style:{fontSize:11,color:"#7a7a72",fontFamily:MONO,marginTop:"0.6rem",textAlign:"center"}},alt)
      );
    }
    const headingMatch=trimmed.match(/^#{2,3}\s+(.*)$/);
    if(headingMatch){
      return h("h3",{key:i,style:{fontFamily:SERIF,fontSize:"1.3rem",fontWeight:700,color:INK,margin:"2rem 0 0.8rem",lineHeight:1.3}},headingMatch[1]);
    }
    if(para.startsWith("- ")||para.includes("\n- ")){
      const items=para.split("\n").filter(l=>l.startsWith("- "));
      return h("ul",{key:i,style:{paddingLeft:"1.5rem",marginBottom:"1.2rem"}},items.map((item,j)=>h("li",{key:j,style:{fontSize:15,color:"#3a3a36",lineHeight:1.85,marginBottom:"0.4rem"},dangerouslySetInnerHTML:{__html:formatInline(item.replace(/^- /,""))}})));
    }
    const processed=formatInline(para);
    return h("p",{key:i,style:{fontSize:15,color:"#3a3a36",lineHeight:1.85,marginBottom:"1.2rem"},dangerouslySetInnerHTML:{__html:processed}});
  }));
}

function ResearchPage({data,setPage,initialSection}){
  const PER_PAGE=10;
  const [filter,setFilter]=useState("all");
  const [rPage,setRPage]=useState(1);
  const [pPage,setPPage]=useState(1);
  const getTag=r=>r.tag||(r.tags&&r.tags[0])||'';
  const getSection=r=>r.section||"research";
  const hero=(data.pageHeroes||{}).research||{};
  const tags=["all",...new Set(data.research.map(getTag).filter(Boolean)),"Featured"];
  const featured=data.research.filter(r=>r.featured&&r.status==="published");
  const handleFilter=t=>{setFilter(t);setRPage(1);setPPage(1);};
  const matchesFilter=r=>filter==="all"||(filter==="Featured"?r.featured:getTag(r)===filter);

  const researchFiltered=data.research.filter(r=>getSection(r)==="research"&&r.status==="published"&&matchesFilter(r));
  const pubsFiltered=data.research.filter(r=>getSection(r)==="publications"&&r.status==="published"&&matchesFilter(r));
  const rTotalPages=Math.max(1,Math.ceil(researchFiltered.length/PER_PAGE));
  const pTotalPages=Math.max(1,Math.ceil(pubsFiltered.length/PER_PAGE));
  const rPaginated=researchFiltered.slice((rPage-1)*PER_PAGE,rPage*PER_PAGE);
  const pPaginated=pubsFiltered.slice((pPage-1)*PER_PAGE,pPage*PER_PAGE);

  const renderCard=r=>h("div",{key:r.id,onClick:()=>setPage(`research/${r.id}`),style:{padding:"1.75rem 0",borderBottom:`1px solid ${RULE}`,cursor:"pointer",transition:"background .2s"},
      onMouseEnter:e=>e.currentTarget.style.background=WARM,onMouseLeave:e=>e.currentTarget.style.background="transparent"},
    h("div",{style:{display:"flex",gap:10,alignItems:"center",marginBottom:"0.6rem"}},
      h("span",{style:{fontSize:10,letterSpacing:"0.09em",textTransform:"uppercase",background:"#f5ede9",color:ACCENT,padding:"3px 9px",fontWeight:500}},getTag(r)),
      h("span",{style:{fontSize:11,color:"#7a7a72",fontFamily:MONO}},r.date)
    ),
    h("h2",{style:{fontFamily:SERIF,fontSize:"1.1rem",fontWeight:700,lineHeight:1.35,color:INK,marginBottom:"0.4rem"}},r.title),
    h("p",{style:{fontSize:13,color:"#3a3a36",lineHeight:1.7,marginBottom:"0.6rem"}},r.excerpt),
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
      h("span",{style:{fontSize:12,color:"#3a3a36",fontFamily:MONO}},r.author),
      h("span",{style:{fontSize:11,color:INK,fontWeight:500,borderBottom:`1px solid ${INK}`,paddingBottom:1}},"Read paper ↗")
    )
  );

  const renderPagination=(totalPages,page,setPageFn)=>totalPages>1&&h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:"0.4rem",padding:"2.5rem 0 1rem",borderTop:`1px solid ${RULE}`,marginTop:"0.5rem"}},
    h("button",{onClick:()=>setPageFn(p=>Math.max(1,p-1)),disabled:page===1,style:{padding:"8px 14px",fontSize:12,fontWeight:500,fontFamily:SANS,cursor:page===1?"not-allowed":"pointer",border:`1px solid ${RULE}`,background:"transparent",color:page===1?"#ccc":INK,opacity:page===1?0.4:1}},"←"),
    ...Array.from({length:totalPages},(_,i)=>i+1).map(n=>
      h("button",{key:n,onClick:()=>setPageFn(n),style:{width:36,height:36,fontSize:12,fontWeight:n===page?700:400,fontFamily:MONO,cursor:"pointer",border:`1px solid ${n===page?INK:RULE}`,background:n===page?INK:"transparent",color:n===page?"#fff":"#3a3a36"}},n)
    ),
    h("button",{onClick:()=>setPageFn(p=>Math.min(totalPages,p+1)),disabled:page===totalPages,style:{padding:"8px 14px",fontSize:12,fontWeight:500,fontFamily:SANS,cursor:page===totalPages?"not-allowed":"pointer",border:`1px solid ${RULE}`,background:"transparent",color:page===totalPages?"#ccc":INK,opacity:page===totalPages?0.4:1}},"→")
  );

  return h("div",{style:{fontFamily:SANS}},
    h(PageHero,{hero,pageName:"Research & Publications"}),
    featured.length>0&&h(FeaturedStrip,{posts:featured,onSelect:r=>setPage(`research/${r.id}`)}),
    h("div",{style:{padding:"1.5rem 2.5rem 1.5rem",borderBottom:`1px solid ${RULE}`}},
      h("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
        tags.map(t=>h("button",{key:t,onClick:()=>handleFilter(t),style:{padding:"7px 16px",fontSize:11,letterSpacing:"0.06em",textTransform:"uppercase",fontFamily:SANS,fontWeight:500,cursor:"pointer",border:`1px solid ${filter===t?INK:RULE}`,background:filter===t?INK:"transparent",color:filter===t?"#fff":"#3a3a36"}},t==="all"?"All":t))
      )
    ),
    h(EditorialImage,{src:(data.editorialImages||{}).research,alt:"PII Research",height:320}),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr"}},
      h("div",{style:{padding:"3rem 2.5rem",borderRight:`1px solid ${RULE}`}},
        h("div",{style:{fontFamily:SERIF,fontSize:"1.7rem",fontWeight:900,color:INK,marginBottom:"1.5rem"}},"Research"),
        rPaginated.length>0?rPaginated.map(renderCard):h("div",{style:{padding:"1.5rem 0 2rem",fontSize:13,color:"#7a7a72"}},"No research pieces found."),
        renderPagination(rTotalPages,rPage,setRPage)
      ),
      h("div",{style:{padding:"3rem 2.5rem"}},
        h("div",{style:{fontFamily:SERIF,fontSize:"1.7rem",fontWeight:900,color:INK,marginBottom:"1.5rem"}},"Publications"),
        pPaginated.length>0?pPaginated.map(renderCard):h("div",{style:{padding:"1.5rem 0 2rem",fontSize:13,color:"#7a7a72"}},"No publications found."),
        renderPagination(pTotalPages,pPage,setPPage)
      )
    )
  );
}

function ContactPage({data}){
  const [sent,setSent]=useState(false);
  const [sending,setSending]=useState(false);
  const [error,setError]=useState("");
  const [form,setForm]=useState({name:"",org:"",email:"",interest:"research",message:"",website:""});
  function submit(){
    if(form.website){ setSent(true); return; } // honeypot — bots fill hidden fields, humans never see this one
    if(!form.name.trim() || !form.email.trim() || !form.message.trim()){
      setError("Please fill in your name, email, and message.");
      return;
    }
    setError(""); setSending(true);
    sbClient.rpc('pii_site_submit_message',{
      p_name: form.name, p_org: form.org, p_email: form.email,
      p_interest: form.interest, p_message: form.message, p_source: 'contact'
    }).then(function(res){
      setSending(false);
      if(res.error){ setError("Something went wrong sending your message. Please email us directly at "+data.site.email+"."); return; }
      setSent(true);
    }).catch(function(){
      setSending(false);
      setError("Something went wrong sending your message. Please email us directly at "+data.site.email+".");
    });
  }
  return h("div",{style:{fontFamily:SANS}},
    h("div",{style:{padding:"4rem 2.5rem",borderBottom:`1px solid ${RULE}`,background:WARM}},
      h("div",{style:tag},"Partner With Us"),

      h("p",{style:{fontSize:15,color:"#3a3a36",lineHeight:1.8,maxWidth:560}},"Whether you're a city government, foundation, academic institution, or emerging venture — we'd love to hear about your work.")
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"2fr 1fr",gap:"4rem",padding:"4rem 2.5rem"}},
      sent?h("div",{style:{padding:"3rem",background:WARM,border:`1px solid ${RULE}`,textAlign:"center"}},

        h("div",{style:{fontSize:14,color:"#3a3a36",lineHeight:1.8}},"Thank you for reaching out. A member of our team will be in touch within 3–5 business days.")
      ):h("div",null,
        error&&h("div",{style:{padding:"0.9rem 1.1rem",marginBottom:"1.2rem",background:"#fdf1ee",border:"1px solid #e8b8a8",color:"#8a3620",fontSize:13,lineHeight:1.6}},error),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.2rem",marginBottom:"1.2rem"}},
          ["name","org"].map(key=>h("div",{key},
            h("label",{style:{display:"block",fontSize:11,fontWeight:500,letterSpacing:"0.06em",textTransform:"uppercase",color:"#3a3a36",marginBottom:"0.5rem"}},{name:"Full Name",org:"Organization"}[key]),
            h("input",{value:form[key],onChange:e=>setForm(f=>({...f,[key]:e.target.value})),style:{width:"100%",padding:"10px 12px",border:`1px solid ${RULE}`,background:"#fff",fontFamily:SANS,fontSize:14,color:INK,outline:"none",boxSizing:"border-box"}})
          ))

function TeamPage({data,setPage}){
  const team=(data.team||[]).slice().sort((a,b)=>(a.order||0)-(b.order||0));
  const groups=["Leadership","Team","Advisors","Fellows","Students & Fellows"];
  const grouped=groups.reduce((acc,g)=>{
    const members=team.filter(m=>m.group===g);
    if(members.length) acc.push({group:g,members});
    return acc;
  },[]);
  // Also catch any uncategorized
  const known=new Set(groups);
  const other=team.filter(m=>!known.has(m.group));
  if(other.length) grouped.push({group:"Other",members:other});

  const AvatarPlaceholder=({name,size=120})=>{
    const initials=name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
    return h("div",{style:{width:size,height:size,background:`hsl(${name.charCodeAt(0)*5%360},20%,88%)`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:SANS,fontSize:size*0.32,fontWeight:700,color:INK,flexShrink:0,letterSpacing:"0.02em"}},initials);
  };

  return h("div",{style:{fontFamily:SANS}},
    h(PageHero,{hero:(data.pageHeroes||{}).team||{title:"Our People",subtitle:"The researchers, advisors, and civic leaders behind PII's work."},pageName:"Our People"}),

      h("div",{key:group,style:{padding:"3.5rem 2.5rem",borderBottom:`1px solid ${RULE}`,background:group==="Advisors"?WARM:"#fff"}},
        h("div",{style:{fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:ACCENT,fontWeight:500,marginBottom:"2rem"}},[group==="Leadership"?"Institute Leadership":group==="Team"?"Core Team":group==="Advisors"?"Advisors & Board":group==="Fellows"?"Fellows & Researchers":group==="Students & Fellows"?"Students & Fellows":group].join("")),
        group==="Leadership"

              members.map(m=>h("div",{key:m.id,style:{display:"flex",gap:"1.5rem",alignItems:"flex-start",padding:"1.5rem",border:`1px solid ${RULE}`,background:"#fff"}},
                m.photo
                  ? h("img",{src:m.photo,style:{width:100,height:100,borderRadius:"50%",objectFit:"cover",flexShrink:0,border:`2px solid ${RULE}`}})
                  : h(AvatarPlaceholder,{name:m.name,size:100}),

            h("div",null,
              h("div",{style:{display:"flex",gap:8,alignItems:"center",marginBottom:"0.5rem"}},
                h("span",{style:{fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",background:typeColors[o.type]||"#f3f0e8",color:typeText[o.type]||INK,padding:"3px 8px",fontWeight:500}},typeLabels[o.type]||o.type),
                o.location&&h("span",{style:{fontSize:11,color:"#7a7a72",fontFamily:MONO}},o.location)
              ),
              h("h2",{style:{fontFamily:SERIF,fontSize:"clamp(1.2rem,2vw,1.6rem)",fontWeight:700,color:INK,lineHeight:1.2}},o.title)
            ),
            h("div",{style:{textAlign:"right",flexShrink:0}},
              o.deadline&&o.deadline!=="Rolling"&&h("div",{style:{fontSize:11,color:"#7a7a72",marginBottom:"0.4rem"}},"Deadline: ",h("strong",{style:{color:INK}},o.deadline)),
              o.deadline==="Rolling"&&h("div",{style:{fontSize:11,color:"#7a7a72",marginBottom:"0.4rem"}},"Rolling applications"),
              o.applyUrl&&h("a",{href:o.applyUrl,target:o.applyUrl.startsWith("#")?"_self":"_blank",rel:"noopener",onClick:o.applyUrl==="#contact"?e=>{e.preventDefault();setPage("contact");}:undefined,style:{display:"inline-block",padding:"10px 20px",background:INK,color:"#fff",fontSize:12,fontWeight:500,letterSpacing:"0.05em",textTransform:"uppercase",textDecoration:"none",fontFamily:SANS}},"Apply →")
            )
          ),
          h(BodyText,{text:o.description})
        ))
      )
    ),
    open.length===0&&h("div",{style:{padding:"3.5rem 2.5rem",borderBottom:`1px solid ${RULE}`}},
      h("div",{style:{fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:ACCENT,fontWeight:500,marginBottom:"1rem"}},"Current Openings"),
      h("div",{style:{padding:"3rem",border:`1px solid ${RULE}`,textAlign:"center",background:"#fff"}},
        h("p",{style:{fontSize:14,color:"#7a7a72",lineHeight:1.8}},
          "There are no open positions at this time. Check back regularly or reach out to share your interest in joining our work."
        ),
        h("button",{onClick:()=>setPage("contact"),style:{...btn(),marginTop:"1.5rem"}})
      )
    ),
    closed.length>0&&h("div",{style:{padding:"2.5rem 2.5rem",background:WARM,borderBottom:`1px solid ${RULE}`}},
      h("div",{style:{fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:"#7a7a72",fontWeight:500,marginBottom:"1rem"}},"Closed / Coming Soon"),
      h("div",{style:{display:"grid",gap:"0.8rem"}},
        closed.map(o=>h("div",{key:o.id,style:{border:`1px solid ${RULE}`,background:"rgba(255,255,255,0.5)",padding:"1.2rem 1.5rem",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"0.8rem",opacity:0.65}},
          h("div",null,
            h("div",{style:{fontFamily:SERIF,fontSize:"1rem",fontWeight:700,color:INK}},o.title),
            h("div",{style:{fontSize:11,color:"#7a7a72",marginTop:3}},typeLabels[o.type]||o.type)
          ),
          h("span",{style:{fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",color:"#7a7a72",border:`1px solid ${RULE}`,padding:"4px 10px"}},o.status==="closed"?"Closed":"Coming Soon")
        ))
      )
    ),
    h("div",{style:{padding:"3.5rem 2.5rem",textAlign:"center"}},
      h("h2",{style:{fontFamily:SERIF,fontSize:"clamp(1.5rem,3vw,2.2rem)",fontWeight:700,color:INK,marginBottom:"0.9rem"}},"Don\u2019t see what you\u2019re looking for?"),
      h("p",{style:{fontSize:14,color:"#3a3a36",lineHeight:1.8,maxWidth:480,margin:"0 auto 1.8rem"}},"We\u2019re always interested in hearing from talented researchers, practitioners, and mission-driven organizations. Reach out to start a conversation."),
      h("button",{onClick:()=>setPage("contact"),style:btn({padding:"13px 28px"})},"Contact Us →")
    )
  );
}

function App(){
  const [page,setPage]=useState(()=>pathToPage(window.location.pathname));

  // Respond to browser Back/Forward
  useEffect(()=>{
    const onPop=()=>setPage(pathToPage(window.location.pathname));
    window.addEventListener("popstate",onPop);
    return()=>window.removeEventListener("popstate",onPop);
  },[]);
  const [data,setData]=useState(()=>loadData());

  // Listen for storage changes (CMS updates in same browser)
  useEffect(()=>{
    const handler=e=>{if(e.key===STORAGE_KEY)setData(loadData());};
    window.addEventListener("storage",handler);
    return()=>window.removeEventListener("storage",handler);
  },[]);

  // Pull the shared copy from Supabase — this is what makes CMS edits made
  // from any device/location visible to every visitor, instead of each
  // browser only ever falling back to its own local cache or the hardcoded
  // defaults baked into this file at export time.
  useEffect(()=>{
    let cancelled=false;
    const refresh=()=>{fetchRemoteData().then(remote=>{if(!cancelled&&remote)setData(remote);});};
    refresh();
    const interval=setInterval(refresh,120000); // pick up edits during long-lived visits too
    return()=>{cancelled=true;clearInterval(interval);};
  },[]);

  // Dynamic SEO meta + GA4 page tracking on route change
  useEffect(()=>{
    const [root,sub]=page.split("/");
    let title="The Public Innovation Institute";
    let desc="Working at the intersection of technology, public policy, and urban systems.";
    let url="https://www.thepii.org/";

    if(root==="research"&&sub){
      const a=data.research.find(r=>r.id===sub);
      if(a){title=a.title+" — PII";desc=a.excerpt||desc;url="https://www.thepii.org/research/"+sub;}
    } else if(root==="research"){
      title="Research — The Public Innovation Institute";desc="Publications, working papers, and data-driven policy research from PII.";url="https://www.thepii.org/research";
    } else if(root==="publications"&&sub){
      const a=data.research.find(r=>r.id===sub);
      if(a){title=a.title+" — PII";desc=a.excerpt||desc;url="https://www.thepii.org/publications/"+sub;}
    } else if(root==="publications"){
      title="Publications — The Public Innovation Institute";desc="Articles, white papers, policy briefs, and news from PII.";url="https://www.thepii.org/publications";
    } else if(root==="cail"&&sub){
      const p=(data.cailPosts||[]).find(p=>p.id===sub);
      if(p){title=p.title+" — CAIL · PII";desc=p.excerpt||desc;url="https://www.thepii.org/cail/"+sub;}
    } else if(root==="cail"){
      title="City as Innovation Lab — The Public Innovation Institute";desc="Transforming cities into real-world testbeds for public-interest innovation.";url="https://www.thepii.org/cail";
    } else if(root==="hyperion"){
      title="Hyperion — The Public Innovation Institute";desc="PII's flagship urban resilience initiative.";url="https://www.thepii.org/hyperion";
    } else if(root==="programs"){
      title="Programs — The Public Innovation Institute";desc="Academic and professional programs at the intersection of technology, policy, and urban systems.";url="https://www.thepii.org/programs";
    } else if(root==="conference"){
      title="Change.Enabled — The Public Innovation Institute";desc="The annual conference on public-interest innovation and invention.";url="https://www.thepii.org/conference";
    } else if(root==="team"){
      title="People — The Public Innovation Institute";desc="Meet the team behind PII's research, programs, and initiatives.";url="https://www.thepii.org/team";
    } else if(root==="opportunities"){
      title="Opportunities — The Public Innovation Institute";desc="Fellowships, volunteer positions, city partnerships, and company partnerships at PII.";url="https://www.thepii.org/opportunities";
    } else if(root==="about"){
      title="About — The Public Innovation Institute";desc="PII is a Boston-based nonprofit working at the intersection of technology, public policy, and urban systems.";url="https://www.thepii.org/about";
    } else if(root==="contact"){
      title="Contact — The Public Innovation Institute";url="https://www.thepii.org/contact";
    }

    // Update <title>
    document.title=title;
    // Update meta tags
    const setMeta=(sel,val)=>{const el=document.querySelector(sel);if(el)el.setAttribute("content",val);};
    setMeta('meta[name="description"]',desc);
    setMeta('meta[property="og:title"]',title);
    setMeta('meta[property="og:description"]',desc);
    setMeta('meta[property="og:url"]',url);
    setMeta('meta[property="twitter:title"]',title);
    setMeta('meta[property="twitter:description"]',desc);
    const canon=document.querySelector('link[rel="canonical"]');
    if(canon)canon.setAttribute("href",url);

    // Fire GA4 page_view
    if(window.gtag&&(data.site||{}).ga4Id){
      window.gtag('event','page_view',{page_title:title,page_location:url,page_path:"/"+page});
    }
  },[page,data]);

  const go=pg=>{
    window.scrollTo&&window.scrollTo(0,0);
    const path=pageToPath(pg);
    if(window.location.pathname!==path){
      window.history.pushState({page:pg},"",path);
    }
    setPage(pg);
  };
  const [rootPage,subId]=page.split("/");
  const article=(rootPage==="research"||rootPage==="publications")&&subId?data.research.find(r=>r.id===subId):null;
  const program=rootPage==="programs"&&subId?data.programs.find(p=>p.id===subId):null;
  const cailPost=rootPage==="cail"&&subId?(data.cailPosts||[]).find(p=>p.id===subId):null;

  return h("div",{style:{background:PAPER,minHeight:"100vh"}},
    h(Nav,{page:rootPage==="cail"||rootPage==="hyperion"?"initiatives":rootPage==="team"?"about":rootPage==="publications"?"research":rootPage,setPage:go,data}),
    rootPage==="home"&&h(HomePage,{data,setPage:go}),
    rootPage==="research"&&!subId&&h(ResearchPage,{data,setPage:go,initialSection:"research"}),
    rootPage==="research"&&subId&&h(ArticlePage,{article,setPage:go,data}),
    rootPage==="publications"&&!subId&&h(ResearchPage,{data,setPage:go,initialSection:"publications"}),
    rootPage==="publications"&&subId&&h(ArticlePage,{article,setPage:go,data}),
    rootPage==="programs"&&!subId&&h(ProgramsPage,{data,setPage:go}),
    rootPage==="programs"&&subId&&h(ProgramDetail,{program,setPage:go}),
    rootPage==="hyperion"&&h(HyperionPage,{data}),
    rootPage==="cail"&&!subId&&h(CAILPage,{data,setPage:go}),
    rootPage==="cail"&&subId&&h(CAILPostPage,{post:cailPost,setPage:go}),
    rootPage==="conference"&&h(ConferencePage,{data}),
    rootPage==="about"&&h(AboutPage,{data,setPage:go}),
    rootPage==="team"&&h(TeamPage,{data,setPage:go}),
    rootPage==="opportunities"&&h(OpportunitiesPage,{data,setPage:go}),
    rootPage==="contact"&&h(ContactPage,{data}),
    rootPage!=="home"&&h("div",{style:{borderTop:`1px solid ${RULE}`}}),
    h(Footer,{data,setPage:go})
  );
}

ReactDOM.createRoot(document.getElementById("pii-root")).render(h(App));
</script>
</body>
</html>
