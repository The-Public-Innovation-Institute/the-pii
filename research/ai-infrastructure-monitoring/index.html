    {id:3,tag:"Program · Applications Close June 22",title:"PII × Cyvl.AI 2026 Summer Innovation Program",sub:"Six weeks at the intersection of AI, infrastructure data, and urban policy. Fully virtual.",link:"programs/piixcyvl-2026",status:"active"}
  ],
  research:[
    {id:"ai-infrastructure-monitoring",title:"A Framework for Using AI-Enabled Infrastructure Monitoring as a Public Health Intervention",author:"Khahlil Louisy",authorBio:"Founder and Director of The Public Innovation Institute. Research affiliate at the Bloomberg Center for Cities, Harvard Kennedy School.",affiliation:"Harvard Bloomberg Center — Data-Smart City Solutions",tag:"Infrastructure & Public Health",status:"published",date:"March 27, 2026",excerpt:"This new framework proposes a method for cities to transform infrastructure monitoring into actionable public health strategy, prioritizing repairs where they're needed most while reducing health disparities.",body:"Published in: <a href=\"https://datasmart.hks.harvard.edu/ai-infra-public-health\" target=\"_blank\" rel=\"noopener\">Data-Smart City Solutions Program, Bloomberg Center for Cities, at Harvard University</a>\n\n**This new framework proposes a method for cities to transform infrastructure monitoring into actionable public health strategy, prioritizing repairs where they're needed most while reducing health disparities.**\n\nA growing number of cities are adopting sophisticated tools capable of detecting, classifying, and mapping infrastructure conditions at a scale and resolution that was previously unattainable. AI-enabled monitoring systems now generate continuous, geospatially precise inventories of sidewalk, roadway conditions, and other above ground attributes, capturing deterioration patterns that evolve long before visible failure or injury occurs. Yet the availability of this data alone does not guarantee improved public health outcomes. Without an explicit framework for interpretation, prioritization, and action, AI-generated insights risk remaining isolated within engineering or asset management workflows and disconnected from the health systems they could meaningfully inform.\n\nThis article proposes a practical framework for translating AI-enabled infrastructure monitoring into preventive public health action. It reframes infrastructure condition data as a form of environmental health surveillance that can guide equitable resource allocation, risk reduction, and accountability for injury prevention, instead of just a passive diagnostic input.\n\n**Building Comprehensive Infrastructure Baselines**\n\nThe foundation of any health-oriented infrastructure strategy is a comprehensive and standardized baseline of existing conditions. Cities can create detailed inventories with AI-monitoring systems that move beyond coarse asset ratings to capture specific distress types, severity levels, spatial extent, and precise location. Unlike traditional inspections, which are episodic and can be subjective, automated assessments provide uniform coverage across neighborhoods and generate data that can be updated regularly.\n\nEstablishing such baselines is critical for two reasons. First, it allows cities to quantify the true scope and distribution of infrastructure risk, including hazards that may not yet have generated complaints or injuries. Second, it creates a reference point against which future deterioration or improvement can be measured. Without a baseline, prioritization decisions remain reactive and anecdotal, driven by visible failures or political pressure rather than systematic risk assessment.\n\n**Integrating Infrastructure Data with Public Health and Exposure Metrics**\n\nInfrastructure condition data acquires public health relevance only when it is linked to information about exposure, vulnerability, and outcomes. A cracked sidewalk does not pose the same risk in all contexts. Risk is shaped by who uses the space, how frequently it is used, and the susceptibility of those users to injury; for example, an elderly person walking to take the bus.\n\nMonitoring infrastructure alone does not prevent injury. For AI-enabled infrastructure assessments to function as a public health intervention, they must be paired with clearly defined response mechanisms. Cities should establish thresholds that trigger specific actions when certain types or severities of deterioration are detected in high-risk contexts. These actions may include temporary mitigation measures such as signage or surface treatments, expedited field inspections, or accelerated inclusion in maintenance and capital repair schedules. The objectives of these are not to replace professional judgment, but to ensure that emerging hazards identified through automated monitoring prompt timely human review and intervention.\n\nRapid response protocols shift infrastructure management toward prevention rather than reaction, closing the gap between when a hazard is detected and when it is addressed. But whether this potential is realized will depend on the willingness of cities to govern infrastructure as a public health system, not on the sophistication of the algorithms.\n\n<a href=\"https://datasmart.hks.harvard.edu/ai-infra-public-health\" target=\"_blank\" rel=\"noopener\">Continue Reading →</a>",featured:true,section:"research",tags:["AI", "Technology", "Public Health", "Infrastructure", "Smart Cities", "Cities", "Artificial Intelligence"],sourceUrl:"https://www.thepii.org/post/a-framework-for-using-ai-enabled-infrastructure-monitoring-as-a-public-health-intervention"},
    {id:"equity-gaps-urban-health",title:"Can AI Address Equity Gaps in Urban Health Surveillance? Evidence from Boston",author:"Khahlil Louisy",authorBio:"Founder and Director of The Public Innovation Institute. Research affiliate at the Bloomberg Center for Cities, Harvard Kennedy School.",affiliation:"Working Paper",tag:"Urban Analytics",status:"published",date:"February 9, 2026",excerpt:"A new working paper examines whether AI-based urban infrastructure monitoring can address equity gaps in public health surveillance, using evidence from Boston's 311 complaint system and AI-detected pavement data.",body:"A new working paper from Khahlil Louisy examines whether AI-based urban infrastructure monitoring can address equity gaps in public health surveillance, using evidence from Boston's 311 complaint system and AI-detected pavement data. The paper shows that complaint-based systems reflect socioeconomic patterns of civic participation, and argues that AI can complement but not replace participatory surveillance without rigorous validation and equity safeguards.\n\n**Abstract**\n\nBackground: Infrastructure defects, particularly pavement quality, contribute substantially to outdoor pedestrian falls, which now exceed motor vehicular injuries as a source of serious pedestrian harm. Public health agencies are increasingly relying on resident complaint systems like 311 platforms for infrastructure surveillance, yet these systems may systematically underrepresent conditions in disadvantaged communities. AI-based monitoring is often proposed as an equity solution and an expanding list of cities are adopting the technology, but empirical evidence is limited.\n\nMethods: I analyzed socioeconomic patterns in 2.97 million Boston 311 reports (phone calls, messages to operators, and use of app) from 2011 to 2024, across 216 Census tracts using multivariable regression, and compared complaint-based versus AI-detected pavement conditions in the Boston neighborhood of Jamaica Plain (5 tracts).\n\nResults: Median household income strongly predicted complaint volume (r=0.42, p<.001) independent of digital access. A $10,000 income increase associated with 14 additional reports per 1,000 residents annually. In Jamaica Plain, the ratio of AI-detected distresses to resident complaints varied 2.4-fold across tracts, indicating systematic divergence between surveillance modalities.\n\nConclusions: Complaint systems reflect civic capacity rather than underlying conditions alone. AI-based monitoring can complement but not replace participatory surveillance. Responsible integration requires multi-modal approaches combining algorithmic detection with community engagement and independent validation. This preliminary work (5 tracts with AI data) illuminates critical tensions requiring expanded multi-city research with health outcomes linkage.\n\nAccess the full paper here: Working_Paper_AI_Urban_Health_Surveillance_1.pdf (PDF, 240KB).",featured:true,section:"research",tags:["AI", "Technology", "Public Policy", "Infrastructure", "Boston", "Smart Cities", "Artificial Intelligence"],sourceUrl:"https://www.thepii.org/post/can-artificial-intelligence-address-equity-gaps-in-urban-health-surveillance-evidence-and-implicati"},
    {id:"residents-vs-algorithms",title:"When Residents and Algorithms See Different Problems",author:"Khahlil Louisy",authorBio:"Founder and Director of The Public Innovation Institute. Research affiliate at the Bloomberg Center for Cities, Harvard Kennedy School.",affiliation:"The Public Innovation Institute",tag:"Infrastructure Equity",status:"published",date:"January 21, 2026",excerpt:"An analysis of roughly 187,000 citizen reports and nearly 5,000 computer vision detections in Jamaica Plain, MA shows why cities need both perspectives and raises critical questions about who gets heard.",body:"Study by: Khahlil A, Louisy\n\nPublished by: <a href=\"https://datasmart.hks.harvard.edu/residents-algorithms-see-different-problems\" target=\"_blank\" rel=\"noopener\">Data-Smart City Solutions, Bloomberg Center for Cities, Harvard University</a>\n\nAn analysis of roughly 187,000 citizen reports and nearly 5,000 computer vision detections in Jamaica Plain, MA shows why cities need both perspectives and raises critical questions about who gets heard. Data from 311 available at data.boston.gov/. Computer vision data provided for research purposes from Cyvl.\n\nIn 2015, the city of Boston launched a redesigned 311 mobile app, making it easier for residents to report urban problems like potholes and broken streetlights. In Jamaica Plain, a nearly 4.5 square mile neighborhood in the city, uptake of the new mobile app was dramatic; based on an analysis of historical data, requests for service surged 234.5%, representing a radical transformation of how residents engaged with city services. This success story, however, raises an uncomfortable question: if civic participation now depends heavily on digital tools like smartphones and apps, are we hearing equally from all residents across neighborhoods?\n\nTo address that question, this article takes an innovative approach that sheds light on this equity challenge and discusses how cities can balance inputs for fair decision-making. An analysis of 14 years of Jamaica Plain's 187,408 311 resident reports was compared with a snapshot of 4,856 pavement defects (identified from Cyvl's computer vision system, which is a combination of LiDAR technology, high-resolution 360-degree cameras, and artificial intelligence), discovered something striking: only 7.9% overlap.\n\nRather than proving one system right and the other wrong, the result of this analysis reveals how different monitoring approaches capture fundamentally different dimensions of urban problems and why that matters for equity. Taken together, they demonstrate how technology can complement civic inputs to produce a more complete and equitable diagnosis of urban problems, than either approach can achieve in isolation.\n\nConsider what this might mean for health challenges, issues like air quality and extreme heat, where...\n\n<a href=\"https://datasmart.hks.harvard.edu/residents-algorithms-see-different-problems\" target=\"_blank\" rel=\"noopener\">Continue Reading →</a>",featured:true,section:"research",tags:["AI", "Infrastructure", "Innovation", "Boston", "Smart Cities"],sourceUrl:"https://www.thepii.org/post/research-when-residents-and-algorithms-see-different-problems"},
    {id:"transportation-safety-build-act",title:"The BUILD America 250 Act: A Missed Opportunity for Safety-First Infrastructure",author:"Khahlil Louisy, Eric Plosky, Giovanni Pintor",affiliation:"Issues in Science and Technology",tag:"Policy Brief",status:"published",date:"April 2026",excerpt:"A critical analysis of the BUILD America 250 Act's transportation safety provisions and what a performance-based alternative would look like.",body:"The BUILD America 250 Act represents the largest single federal infrastructure investment since 2021. Yet its transportation safety provisions repeat the same structural mistakes that have kept American road fatality rates among the highest in the developed world.\n\nThis article argues that the Act's safety provisions are process-oriented rather than outcome-oriented. They require states to develop safety plans and report on activities. They do not require measurable reductions in fatalities as a condition of continued funding.\n\nWe propose a Vision Zero federal funding mechanism that ties a portion of highway formula funding to verified reductions in fatality rates.",featured:false,section:"publications",tags:["Transportation Safety", "Infrastructure", "Policy"],sourceUrl:""},
    {id:"stop-talking-start-testing-innovation-sandboxes",title:"Stop Talking, Start Testing: Why Cities Must Establish Innovation Sandboxes Now",author:"Khahlil Louisy",authorBio:"Founder and Director of The Public Innovation Institute. Research affiliate at the Bloomberg Center for Cities, Harvard Kennedy School.",affiliation:"The Public Innovation Institute",tag:"Article",status:"published",date:"November 25, 2025",excerpt:"The time for conversation has long passed given that the evidence is clear, the tools exist, and the urgency is undeniable. Cities must stop theorizing about innovation partnerships and start creating the regulatory architecture that makes them possible at scale.",body:"For decades, conferences, white papers, and task forces have discussed how to get cities to work with the private sector and universities, which have generated countless frameworks, recommendations, and pilot programs. Yet here we are, still talking about collaboration while cities grapple with accelerating climate disasters, housing crises, failing infrastructure, and emerging public health threats.\n\nThe time for conversation has long passed given that the evidence is clear, the tools exist, and the urgency is undeniable. Cities must stop theorizing about innovation partnerships and start creating the regulatory architecture that makes them possible at scale. One such architecture is the regulatory sandbox and the data proves it works.\n\n**The Evidence Is There**\n\nRegulatory sandboxes aren't a long-shot theoretical concept or an untested idea. Peer-reviewed research across multiple sectors demonstrates their transformative impact on innovation output.\n\nThe evidence is particularly robust in financial technology. A 2024 study published in <a href=\"https://academic.oup.com/rof/article-abstract/28/1/203/7140150?redirectedFrom=fulltext&login=false\" target=\"_blank\" rel=\"noopener\">Review of Finance</a> analyzed the UK's Financial Conduct Authority sandbox and found that firms entering the program experienced a 15% increase in capital raised: approximately $700,000 over two years, with their probability of raising capital increasing by 50%. These firms also showed significantly higher survival rates and increased patenting activity compared to similar firms outside the sandbox.\n\nA <a href=\"https://www.mdpi.com/2199-8531/6/2/43\" target=\"_blank\" rel=\"noopener\">comparative analysis</a> across nine countries by Goo and Heo (2020) found that introducing regulatory sandboxes positively influenced FinTech venture investments, with adoptions having very positive impacts on both total investment amounts and average venture investment scale. A 2025 study published in <a href=\"https://www.tandfonline.com/doi/full/10.1080/00036846.2025.2495886\" target=\"_blank\" rel=\"noopener\">Applied Economics</a> used quasi-natural experiment methodology with panel data from 31 provinces and cities in China from 2011-2022 to examine China's regulatory sandbox system. The study found that implementing the regulatory sandbox system significantly improves financial efficiency, promotes innovation and competition in financial technology, and enhances financial market efficiency.\n\nBeyond finance, systematic literature reviews have explored the growing potential for healthcare sandboxes to test digital health innovations and enable collaborative regulatory development, with sandboxes increasingly used within healthcare regulation according to research published in <a href=\"https://link.springer.com/article/10.1007/s40258-021-00665-1\" target=\"_blank\" rel=\"noopener\">Applied Health Economics and Health Policy</a>. In the energy sector, case studies in the Netherlands and Great Britain showed sandboxes successfully enabled testing of energy communities, peer-to-peer supply models, and new grid arrangements, with both countries' initiatives considered overall positive and quickly expanding based on learnings.\n\nA 2025 systematic review in <a href=\"https://www.tandfonline.com/doi/epdf/10.1080/23311975.2025.2510555?needAccess=true\" target=\"_blank\" rel=\"noopener\">Cogent Business & Management</a> analyzing 40 peer-reviewed articles from 2020-2024 established that regulatory sandboxes foster innovation, facilitate effective regulation, and create collaborative learning environments for regulators and innovators.\n\nThe verdict is in: sandboxes work. They increase investment, accelerate innovation, improve survival rates for new ventures, and create pathways for solutions that address complex societal challenges.\n\n**The Pandemic Proved Cities Can Move Fast**\n\nIf the peer-reviewed evidence weren't enough, the COVID-19 pandemic provided a real-world, large-scale demonstration of what happens when governments create space for rapid innovation through regulatory sandboxes.\n\nPer a detailed analysis in <a href=\"https://issues.org/public-health-data-louisy/\" target=\"_blank\" rel=\"noopener\">Issues in Science & Technology</a>, federal agencies deployed sandbox frameworks at unprecedented scale during the pandemic. The FDA created regulatory sandboxes that authorized a record 132 novel medical devices in 2020, allowing its Digital Health Center of Excellence to expand regulatory flexibility for digital health technologies. The HHS Office for Civil Rights temporarily waived potential penalties for HIPAA violations related to telehealth, leading to a 63-fold increase in telehealth utilization among Medicare beneficiaries. The FDA issued nearly 400 emergency use authorizations for COVID-19 medical products between January 2020 and January 2021, often within weeks rather than the typical multi-year timeline that normally requires several years.\n\nThese regulatory adaptations didn't just respond to the crisis; they catalyzed systemic transformation and enabled the creation of the first genomic surveillance network in the United States, dramatically increasing the percentage of COVID-19 cases sequenced from 3,275 in early January 2021 to 25,000 by late April 2021. The CDC's National Syndromic Surveillance Program expanded emergency department coverage to all 50 states and Guam, with participation rising from 54% of emergency departments in 2018 to approximately 73% by 2022. New standards for large-scale public health data transfers were finalized, mandating adoption of standardized APIs for bulk data access based on the FHIR standard, enabling extraction of critical population-level information in single requests rather than manual queries.\n\nCounties with limited public health data infrastructure experienced higher mortality rates not just from COVID-19 but from other conditions as well, demonstrating the life-and-death consequences of innovation capacity.\n\nThe lesson seems to be clear; when regulators create structured flexibility through sandbox frameworks, innovation accelerates dramatically while maintaining essential safeguards. We know this works because we've seen it work, so the question is whether cities will apply these lessons proactively or wait for the next crisis to force their hand.\n\n**The Stakes Are Too High for More Conversations**\n\nClimate change isn't a future threat, it's already causing billions in damage annually through floods, fires, and extreme weather. The housing affordability crisis is displacing families and destabilizing communities, aging infrastructure threatens public safety, digital divides exclude millions from economic opportunity, and public health systems remain fragile and underfunded.\n\nThese aren't problems that can be solved with incremental adjustments to existing systems, they require wholesale new approaches, including new materials, new technologies, new service models, and new governance structures. Yet, promising innovations remain trapped in pilot purgatory, unable to move from proof-of-concept to citywide implementation because regulatory frameworks designed for 20th-century challenges can't accommodate 21st-century solutions.\n\nConsider the absurdity: We know that regulatory sandboxes increase venture investment by double-digit percentages, we know they improve survival rates for innovative firms, we know they accelerate time-to-market while maintaining safety standards, we know they work in finance, healthcare, energy, and public health, and we've proven cities can move fast when they choose to. Yet, we're still having conversations about whether cities should partner with innovators. Meanwhile, residents suffer in overheated homes during record heat waves because housing codes prohibit new cooling materials, traffic deaths continue because mobility departments can't test safer street designs, and floods destroy neighborhoods because infrastructure rules prevent deployment of innovative stormwater solutions. The cost of inaction compounds daily.\n\n**What Cities Must Do**\n\nCities need to stop talking and start building systematic innovation capacity through formal regulatory sandbox programs. Here's what that means in practice:\n\n**Establish clear sandbox frameworks with defined scope.** Identify specific challenge areas, for example, climate adaptation, affordable housing, mobility, public health, and digital services, where regulatory constraints prevent innovation. Set transparent criteria for what can be tested, what safeguards remain non-negotiable, and how decisions get made.\n\n**Create time-limited testing periods with rigorous evaluation.** Set explicit timeframes, typically 6-24 months, with built-in assessment points. Partner with research institutions to measure outcomes against predetermined metrics. Generate evidence that informs policy and investment decisions.\n\n**Build pathways from sandbox to permanence.** This is where most initiatives fail. Define clear criteria and processes for moving successful innovations from temporary testing to standard practice. Update procurement rules, revise ordinances, and create new financing mechanisms. Make graduation from sandbox status a systematic process, not an ad hoc political decision.\n\n**Enable cross-sector collaboration.** Bring together city agencies, private companies, universities, community organizations, and residents. The pandemic's most successful innovations emerged from these partnerships: companies developing solutions, researchers generating evidence, communities identifying needs, and governments creating enabling frameworks.\n\n**Connect to broader networks.** Individual city efforts are valuable, but systematic transformation requires coordination. This is precisely what The Public Innovation Institute's <a href=\"https://www.thepii.org/city-as-innovation-lab\" target=\"_blank\" rel=\"noopener\">City as Innovation Lab</a> (CAIL) initiative enables: transforming cities into living laboratories where solutions are designed, tested, and scaled through structured partnerships.\n\nSome cities have already signed on to CAIL, recognizing that mounting challenges require more than good intentions; they demand real-world testing, robust research, and clear pathways to implementation. But more cities are needed to build a network powerful enough to serve as a genuine driving force of innovation and invention in the public interest.\n\n**Stop Waiting for Permission**\n\nThe most pernicious myth in urban governance is that cities need to wait for federal leadership, for perfect conditions, for consensus, or for more studies. This is nonsense because cities have legal authority to establish regulatory sandboxes in most domains under their control. They have models to learn from in finance, healthcare, and energy; have evidence that sandboxes work; and they have urgent problems that demand solutions. What they lack is political will.\n\nCity leaders must recognize that inaction is a choice and one with devastating consequences for residents. Every month spent in another planning meeting or convening about public-private partnerships is a month when families can't afford housing, when outdated infrastructure threatens safety, when inadequate climate adaptation leaves communities vulnerable, and when digital divides exclude residents from opportunity.\n\nThe cities that take the lead to establish regulatory sandboxes will accelerate innovation, attract investment, generate evidence, and build capacity to address complex challenges. Cities that continue talking will watch problems compound while solutions remain stuck in regulatory limbo. The choice is stark: Cities can approach innovation creatively and systematically through sandbox frameworks that enable responsible experimentation, or they can maintain status quo regulatory structures designed for challenges that no longer exist while new crises overwhelm their capacity to respond.\n\n**References:**\n\nCornelli, G., Doerr, S., Gambacorta, L., & Merrouche, O. (2024). Regulatory Sandboxes and Fintech Funding: Evidence from the UK. Review of Finance, 28(1), 203-233. https://doi.org/10.1093/rof/rfad017\n\nGoo, J. J., & Heo, J. Y. (2020). The Impact of the Regulatory Sandbox on the Fintech Industry, with a Discussion on the Relation between Regulatory Sandboxes and Open Innovation. Journal of Open Innovation: Technology, Market, and Complexity, 6(2), 43.\n\nLugo-Palacios, D.G., Cairns, J., Massey, J. (2021). The Sandbox Approach and its Potential for Use in Health Technology Assessment: A Literature Review. Applied Health Economics and Health Policy, 19, 665-676. https://doi.org/10.1007/s40258-021-00665-1\n\nLouisy, K. (2025). Preventing the Next Public Health Emergency: During the pandemic, small shifts in health data regulation revealed big insights for disease prevention. Issues in Science & Technology. https://issues.org/public-health-data-louisy/",featured:false,section:"publications",tags:["Innovation", "smart cities", "Regulations"],sourceUrl:"https://www.thepii.org/post/stop-talking-start-testing-why-cities-must-establish-innovation-sandboxes-now"},
    {id:"governance-gap-ai-adoption",title:"The Governance Gap: Why Cities Are Racing Toward AI Adoption Without a Map",author:"Khahlil Louisy",authorBio:"Founder and Director of The Public Innovation Institute. Research affiliate at the Bloomberg Center for Cities, Harvard Kennedy School.",affiliation:"The Public Innovation Institute",tag:"Article",status:"published",date:"November 17, 2025",excerpt:"Municipalities are deploying artificial intelligence faster than they can govern it and the consequences from this AI adoption reach every resident.",body:"By: Khahlil A, Louisy\n\n**Municipalities are deploying artificial intelligence faster than they can govern it and the consequences reach every resident.**\n\nIncredibly in some cities today, a traffic light algorithm quietly decides your morning commute, an AI system triages which neighborhood gets priority for infrastructure repairs, while another determines how fast emergency services respond to your street. Across cities worldwide, artificial intelligence use is rapidly moving from pilot programs to public infrastructure, often without residents knowing that these systems exist, let alone how they work or who will be held accountable when they fail.\n\nThe numbers tell a striking story: In a <a href=\"https://living-in.eu/sites/default/files/files/ai-and-genai-adoption-by-local-and-regional-administrations-qg0124026enn_0.pdf\" target=\"_blank\" rel=\"noopener\">survey of more than 100 European cities</a>, over two-thirds reported using AI to analyze transport, environmental, or service-delivery data. Yet only a small fraction described themselves as having dedicated ethics and audit frameworks. The vast majority fall into an \"experimenting\" or \"adopting\" category which really means they are rolling out pilots faster than they can define accountability. These actions are creating what experts call a \"governance gap:\" that widening space between technological deployment and the ethical, legal, and operational frameworks needed to manage it responsibly.\n\nWhat makes this governance gap particularly urgent is that most residents have no idea AI is making decisions about their lives. According to recent research <a href=\"https://dl.acm.org/doi/10.1145/3715275.3732049\" target=\"_blank\" rel=\"noopener\">analyzing municipal AI procurement practices</a>, AI acquired by cities often doesn't go through conventional public procurement processes, creating significant oversight challenges. When these systems are classified as \"operational analytics\" rather than \"high-risk\" applications, they can escape regulatory scrutiny entirely, even when they determine which services get prioritized or how public resources are allocated.\n\nThe <a href=\"https://artificialintelligenceact.eu/the-act/\" target=\"_blank\" rel=\"noopener\">European Parliament's 2024 AI Act</a> requires transparency for high-risk systems, but many municipal tools sidestep this requirement through creative categorization because providers conduct their own risk assessment and could determine that their systems are not \"high risk.\" In practice, this means the algorithm managing your city's traffic flow or the system deciding infrastructure maintenance schedules might never appear in any public registry.\n\nThis level of invisibility breeds a dangerous form of \"responsibility drift\" because when something goes wrong, whether biased service allocation, algorithmic errors, or discriminatory outcomes, no one knows who's accountable. Is it the human analyst who approved the AI's recommendation and put it in a policy report? The vendor who designed the system? Or is it the city official who procured it? Without clear governance structures, accountability dissolves.\n\n**The Two-Tier City Emerging From AI Adoption**\n\nBut the governance gap isn't just about oversight, it's also about creating profound inequities between cities. Wealthier municipalities can afford sophisticated AI systems that forecast energy demand, predict flooding, optimize public transport, and automate complex services. They also have the budgets to ensure they have teams with both the capacity and capability to interact and manage these technologies. In contrast, smaller towns and under-resourced cities rely on manual and often outdated processes.\n\nThis discontinuity from wealthy cities to under-resourced mirrors the digital infrastructure divide: cities rich in data get smarter faster, while others fall further behind. The European Commission warns this could lead to a two-tier model of public service: one algorithmically optimized, the other perpetually struggling. When AI adoption outpaces governance capacity, the cities that need technological assistance most are least equipped to deploy it responsibly.\n\nThe equity implications naturally extend to residents too. AI systems trained on incomplete or biased datasets can exacerbate existing inequities in policing (we've already seen multiple instances of this happening), service allocation, and resource distribution. Without proper governance frameworks that mandate inclusive datasets and equity impact assessments, these tools risk automating and amplifying historical discrimination.\n\nBut all is not terrible and there is good news too: pioneering cities are showing what responsible AI governance looks like in practice. Cities like Seattle, San José, and Boston have developed frameworks that don't just regulate AI use, they embed ethics into procurement, deployment, and monitoring from the start.\n\n<a href=\"https://techtalk.seattle.gov/2023/05/31/city-of-seattle-adopts-generative-ai-policy/\" target=\"_blank\" rel=\"noopener\">Seattle's approach</a> is instructive: All AI software, even free or pilot products, must be submitted through the city's procurement process and reviewed by its Digital Privacy Office. The city makes documentation related to the use of AI publicly available. Great examples of this approach are Helsinki and Amsterdam, that go as far as maintaining <a href=\"https://algoritmes.overheid.nl/en/organisatie/gm0363/gemeente-amsterdam\" target=\"_blank\" rel=\"noopener\">Algorithm Registers</a>.\n\nSan José has gone further, founding the GovAI Coalition: a partnership of over 150 local, county, and state agencies creating frameworks for responsible AI. In February 2025, the coalition launched an <a href=\"https://www.withpavilion.com/associations/gov-ai\" target=\"_blank\" rel=\"noopener\">AI Contract Hub</a> with shared contract templates, cooperative agreements, and best practices that any public agency can use. This addresses a critical challenge of cities lacking the technical expertise to evaluate AI vendors or monitor system performance independently.\n\nBoston's <a href=\"https://www.boston.gov/sites/default/files/file/2023/05/Guidelines-for-Using-Generative-AI-2023.pdf\" target=\"_blank\" rel=\"noopener\">interim guidelines</a> emphasize responsible experimentation with clear guardrails: staff must fact-check AI-generated content, disclose AI use in public communications, and never share sensitive information with AI systems. Crucially, the policy establishes that generative AI, like all technology, is a tool and users remain accountable for its outcomes.\n\n**The Procurement Lever**\n\nOne of the most powerful and underutilized tools for responsible AI governance is public procurement. As Carnegie Endowment <a href=\"https://carnegieendowment.org/posts/2024/03/how-cities-use-the-power-of-public-procurement-for-responsible-ai?lang=en\" target=\"_blank\" rel=\"noopener\">researchers note</a>, procurement represents a major driver of economic activity and a vehicle for achieving policy goals at all levels of government. Yet it's often overlooked in AI governance discussions.\n\nWhen cities specify ethical requirements in procurement contracts such as: transparency about training data, bias testing, performance monitoring, and data privacy protections, they shift the burden of responsibility from under-resourced public agencies to the companies developing and selling AI systems. California's purchasing power makes this particularly significant: standards established there through state executive orders and coalitions like GovAI have the potential to become de facto national or even global standards.\n\nThe issue, of course, is that procurement alone isn't sufficient. Recent research on U.S. cities' AI procurement practices reveals persistent information asymmetries between governments and vendors. Sales representatives shape cities' understanding of AI through pitch-style demos, often failing to report basic information unless explicitly asked. One city employee shared that risks from AI hallucinations \"weren't part of the conversation\" when procuring a chatbot service, because the vendor never mentioned them.\n\n**Here's What Cities Need Now**\n\nAddressing the governance gap requires action on multiple fronts:\n\n**1. Start with assessment, not technology.** Before deploying AI, cities must evaluate internal readiness, align tools with actual service goals, and identify capability (not just capacity) gaps. The question isn't \"What AI can we use?\" but \"What problems do we need to solve, and is AI the right solution?\"\n\n**2. Demand vendor transparency.** Procurement contracts should require vendors to disclose training data sources, bias testing results, performance metrics, and how systems will be monitored over time. Cities shouldn't have to develop evaluation metrics themselves, that expertise should be a contract requirement.\n\n**3. Build public oversight mechanisms.** Algorithm registers, public dashboards of AI deployments, and participatory design reviews should become baseline expectations. Transparency isn't just about good ethics, it also helps build the public trust which is necessary for successful technology adoption.\n\n**4. Invest in capacity building.** Cities need staff with technical literacy to evaluate AI systems, ask critical questions, and monitor performance. Peer networks like GovAI provide crucial knowledge sharing, but cities also need dedicated resources for training and hiring.\n\n**5. Establish clear accountability structures.** Before deployment, define who owns decisions when AI is involved, how errors will be addressed, and what recourse residents have when systems produce harmful outcomes.\n\n**6. Prioritize equity from the start.** Every AI procurement should include equity impact assessments. Systems must be tested with diverse datasets and evaluated for disparate impacts on marginalized communities before deployment. This point can't be stressed enough!\n\nNone of this means cities should avoid AI because the technology offers genuine potential to address urban challenges: from optimizing traffic flow and reducing emissions to improving emergency response times and expanding access to services. Singapore's <a href=\"https://www.aleaitsolutions.com/singapore-introduces-ai-powered-traffic-management-system-a-step-towards-smart-city-success/\" target=\"_blank\" rel=\"noopener\">AI-driven traffic management</a> has decreased peak-hour delays by 20% while reducing emissions. Barcelona's <a href=\"https://www.meet.barcelona/fr/investir-et-faire-des-affaires/articles-d-actualite/barcelona-city-council-launches-a-new-employment-website-using-artificial-intelligence-1510062\" target=\"_blank\" rel=\"noopener\">AI-powered employment platform</a> attracted over 730,000 users in 2024, matching workers to opportunities more effectively than manual systems.\n\nBut these successes share a common thread in that they paired technological innovation with robust governance structures, stakeholder engagement, and ongoing monitoring. They treated AI as public infrastructure, that is, transparent, accountable, and designed to serve all residents, not just those with digital access. The challenge for cities isn't whether to adopt AI, those who aren't in the process of doing so now risk being left behind, but how to do so responsibly. As one municipal technology leader observed, \"By 2025, AI will be neither magic nor dystopia but rather a pragmatic suite of tools.\" The cities that thrive will be those that close the governance gap, ensuring that innovation serves the public good rather than outpacing public accountability.\n\nAt The Public Innovation Institute, we work at precisely this intersection, where technology meets policy, innovation confronts governance challenges, and where the question isn't just \"Can we build it?\" but \"Should we, and if so, how?\" The governance gap isn't inevitable, it's a choice and one that cities, with the right frameworks and support, can choose differently.\n\nThe Public Innovation Institute partners with cities, researchers, and innovators to develop practical frameworks for responsible technology adoption. Our work in AI ethics, civic infrastructure, and public sector innovation helps bridge the gap between technological possibility and public accountability. Learn more at <a href=\"https://www.thepii.org\" target=\"_blank\" rel=\"noopener\">thepii.org</a>.",featured:false,section:"publications",tags:["AI", "AI Ethics", "Cities", "Governance"],sourceUrl:"https://www.thepii.org/post/the-governance-gap-why-cities-are-racing-toward-ai-adoption-without-a-map"},
    {id:"boston-nyc-northeast-corridor",title:"From Boston to NYC: Building the Northeast Corridor as the World's Most Powerful Urban Innovation Engine",author:"PII",affiliation:"The Public Innovation Institute",tag:"Article",status:"published",date:"November 14, 2025",excerpt:"Along the 215 miles connecting Boston and New York City runs one of the world's most concentrated pathways of intellectual capital, research infrastructure, and innovation capacity.",body:"City of Boston, MA\n\nAlong the 215 miles connecting Boston and New York City runs one of the world's most concentrated pathways of intellectual capital, research infrastructure, and innovation capacity. Yet this corridor has largely functioned as a collection of distinct regional ecosystems rather than as an integrated system. The question is no longer whether these cities can innovate independently—they demonstrably can, but by how much can their collective impact on society's most pressing challenges be multiplied, through coordinated collaboration?\n\n**Cambridge and Boston: The Innovation Anchors**\n\nBoston's innovation capacity extends from MIT's <a href=\"https://biomimetics.mit.edu/\" target=\"_blank\" rel=\"noopener\">Biomimetic Robotics Laboratory</a> and <a href=\"https://www.media.mit.edu/\" target=\"_blank\" rel=\"noopener\">Media Lab</a> which advances robotics, social technologies, and space exploration, to Harvard's groundbreaking CRISPR research that enabled the first FDA-approved gene therapy for sickle cell disease and pioneered xenotransplantation. Harvard's prime editing system can correct up to 89 percent of known disease-causing genetic variations. The state's MassDevelopment network and Massachusetts Office of Business Development translate these research outputs into commercial ventures, creating one of the world's densest biotech ecosystems.\n\n**Providence: The Emerging Research Economy**\n\nGeographically right below Massachusetts, the Rhode Island Commerce Corporation and Brown University have transformed Providence's Jewelry District into a life sciences hub through Brown's facility investment in South Street Landing and the Innovation Center at 225 Dyer Street. <a href=\"https://www.brown.edu/sites/default/files/financialreports/Presidents_Financial_Report_FY24.pdf\" target=\"_blank\" rel=\"noopener\">Brown's research expenditures rose to $293.1 million in FY24</a>, establishing it as Rhode Island's largest center for scientific R&D. Simultaneously, The Rhode Island Economic Development Corporation's <a href=\"https://rihub.org/rihub-incubator/\" target=\"_blank\" rel=\"noopener\">iHub accelerator</a> and the Rhode Island <a href=\"https://www.rilifescience.com/\" target=\"_blank\" rel=\"noopener\">Life Sciences Hub</a> create pathways for university research to reach commercial application.\n\n**New Haven: Quantum Technologies and Biotech Convergence**\n\nConnecticut's $50.5 million investment in <a href=\"https://portal.ct.gov/governor/news/press-releases/2025/09-2025/governor-lamont-announces-landmark-investments-in-downtown-new-haven?language=en_US\" target=\"_blank\" rel=\"noopener\">New Haven's Innovation Cluster</a> positions the city at the intersection of life sciences and quantum computing. Yale University and the University of Connecticut co-lead <a href=\"https://quantumct.org/\" target=\"_blank\" rel=\"noopener\">QuantumCT</a>, coordinating quantum infrastructure that could attract up to $160 million in federal investment. Yale's two-decade pioneering work on superconducting qubits—the fundamental units of quantum data—informs quantum applications worldwide through the <a href=\"https://quantuminstitute.yale.edu/\" target=\"_blank\" rel=\"noopener\">Yale Quantum Institute</a>. Simultaneously, New Haven has established itself as a biotech center through <a href=\"https://www.scienceparknewhaven.org/\" target=\"_blank\" rel=\"noopener\">Science Park</a>'s laboratory facilities and <a href=\"https://www.districtnhv.com/\" target=\"_blank\" rel=\"noopener\">District NHV's</a> 100,000-square-foot tech campus, supported by the Connecticut Department of Economic and Community Development. This convergence matters because quantum computing promises to accelerate drug discovery and solve computational problems that currently limit biomedical research, among numerous other applications.\n\n**New York City: Scale and Applied Urban Innovation**\n\nNew York City's Applied Sciences initiative (a Bloomberg-era initiative) created multiple nodes of technology-focused graduate education and entrepreneurship. Cornell Tech's $2 billion <a href=\"https://tech.cornell.edu/news/cornell-tech-campus-opens-on-roosevelt-island-marking-transformational-mile/\" target=\"_blank\" rel=\"noopener\">Roosevelt Island campus</a> combines graduate education with startup incubation, projecting $1.5 billion in annual economic impact and 7,000 jobs by 2030, while <a href=\"https://engineering.nyu.edu/research/centers/cusp\" target=\"_blank\" rel=\"noopener\">NYU's Center for Urban Science and Progress</a> (CUSP) focuses on urban informatics, using New York as a laboratory to develop solutions for infrastructure, resource allocation, and mobility that have global applicability. <a href=\"https://datascience.columbia.edu/\" target=\"_blank\" rel=\"noopener\">Columbia's Data Science Institute</a> and the New York City Economic Development Corporation (NYCEDC) facilitate connections between academic institutions, city agencies, and private-sector partners. Collectively, the Applied Sciences projects illustrate how NYC's scale provides immediate access to diverse industries, massive talent pools, capital markets and the infrastructure needed for rapid growth.\n\n**The Infrastructure Gap**\n\nBut there is a massive problem. While each city possesses significant assets: research universities, specialized agencies, funding mechanisms, and industry partners, they lack systematic coordination. Researchers in Boston developing new materials or sensing technologies rarely have structured channels to pilot their innovations in New Haven's quantum facilities or through NYC's urban testing environments. Start-ups emerging from Providence face barriers accessing the venture capital concentrated in Boston and New York, while quantum-computing applications developed in New Haven could accelerate drug-discovery research happening across the corridor.\n\nTransportation infrastructure physically connects these cities, but innovation infrastructure including the platforms, protocols, and partnerships that enable collaborative problem-solving, remains underdeveloped. The result is four strong but partially isolated ecosystems, when the proximity and complementary strengths suggest an integrated network would generate greater impact.\n\n**The Role of City as Innovation Lab**\n\nThe <a href=\"https://www.thepii.org/city-as-innovation-lab\" target=\"_blank\" rel=\"noopener\">City as Innovation Lab (CAIL)</a> initiative, developed by <a href=\"https://www.thepii.org/\" target=\"_blank\" rel=\"noopener\">The Public Innovation Institute</a>, offers a framework specifically designed to bridge these gaps. CAIL works with cities to transform them into living laboratories where new solutions are designed, tested, and scaled through partnerships among city governments, private-sector innovators, and researchers.\n\nThe initiative focuses on seven core areas that align precisely with the Northeast Corridor's collective strengths: AI and civic infrastructure, housing and public health, climate and energy futures, education and workforce innovation, built environment and construction innovation, water and marine resilience, and mobility and smart transportation. These are not theoretical categories but the actual domains where corridor cities face urgent needs and where research institutions possess relevant expertise. Further, CAIL's model addresses several persistent challenges in urban innovation:\n\nReal-World Testing and Validation: Technologies often stall between proof-of-concept and deployment. CAIL creates structured pathways for companies to pilot solutions in diverse urban environments while generating independent, research-backed evidence of effectiveness. For quantum-sensing applications, this might mean testing in Providence's infrastructure systems before scaling to Boston's transit network. For biotech interventions, it could enable comparative studies across different population-health systems from New Haven to NYC.\n\nPolicy and Governance Pathways: Innovative technologies frequently fail not due to technical limitations but because regulatory frameworks, procurement processes, and governance structures were designed for previous generations of solutions. CAIL helps cities identify and modify the policy mechanisms that enable innovations to move from pilots to permanent adoption. When Boston develops new approaches to climate resilience, those policy frameworks could be adapted for Providence and New Haven rather than each city independently navigating identical regulatory challenges.\n\nCross-Sector Collaboration: Universities excel at research, companies at commercialization, and cities at identifying public priorities, but these entities often struggle to work together effectively. CAIL provides structured collaboration mechanisms that align civic priorities with private-sector capacity and academic expertise. This alignment is particularly valuable in a corridor context where different cities possess different institutional strengths.\n\nMulti-City Learning and Scaling: Perhaps most importantly for the corridor concept, CAIL emphasizes comparative research and knowledge sharing across a network of cities. Solutions developed and tested in one location can be evaluated and adapted for others, with research comparing outcomes, scalability, and public impact across different contexts.\n\n**A Corridor Strategy**\n\nImagine a biotech startup emerging from Brown's research establishing initial proof-of-concept in Providence, conducting clinical trials through Yale New Haven Hospital's research infrastructure, and scaling operations in Boston's established biotech ecosystem with access to NYC's capital markets. Or MIT developing AI-powered urban systems that pilot in Cambridge, undergo comparative testing across Providence and New Haven's different urban densities, and deploy at scale through NYC's massive municipal systems, with each implementation generating data that refines the technology.\n\nThese scenarios require much more than goodwill, they need coordinated infrastructure that includes: shared data standards, portable regulatory approvals, aligned funding mechanisms, and reciprocal research agreements. They require economic-development agencies in each city to view corridor-wide success as aligned with local interests rather than zero-sum competition and they need state governments to recognize that regional innovation systems increasingly function as the relevant unit of economic competition.\n\nCAIL aims to serve as the connective tissue. By establishing consistent approaches to innovation piloting across corridor cities, creating shared evaluation frameworks, and building structured pathways for scaling successful interventions, the initiative enables the corridor to function as an integrated innovation system while respecting each city's distinct identity and priorities. The economic logic is straightforward: Global competition for innovation leadership occurs primarily among regions, not individual cities. The San Francisco Bay Area functions as an integrated system. The same is true for London and its surrounding research universities, or Shenzhen and its manufacturing ecosystem. The Northeast Corridor's fragmentation reduces each city's competitiveness relative to more integrated regional competitors.\n\nBut the imperative extends beyond economics. The challenges these cities confront such as climate adaptation, affordable housing, healthcare access, infrastructure modernization, and educational equity, exceed any single city's capacity to solve alone. They require the kind of sustained, large-scale innovation that emerges from coordinated regional efforts and the corridor's concentration of research capability, diverse urban environments for testing, and pathways to scale create precisely the conditions for developing and deploying solutions that could then extend nationally and globally.\n\nThe question facing leadership across the corridor is whether they will continue operating as four strong but separate innovation ecosystems or build the connections that transform geographic proximity into functional integration. The infrastructure exists, the talent is present, and the research capacity is proven. What's needed is the commitment to systematic collaboration and the frameworks that make coordination efficient rather than burdensome.\n\nThat's what CAIL offers: not a theoretical vision of collaboration but practical mechanisms for making it work. The Northeast Innovation Corridor's potential isn't aspirational, it's only latent, waiting for the right catalyzing structures to activate it.",featured:false,section:"publications",tags:["AI", "Technology", "NYC", "Innovation", "CAIL", "Boston", "New Haven", "Providence", "Infrastructure"],sourceUrl:"https://www.thepii.org/post/from-boston-to-nyc-building-the-northeast-corridor-as-the-world-s-most-powerful-urban-innovation-en"},
    {id:"summer-student-clinical-research-professional",title:"From Summer Student to Clinical Research Professional: How PII's Summer Program Changed Everything",author:"PII",affiliation:"The Public Innovation Institute",tag:"Feature",status:"published",date:"November 4, 2025",excerpt:"Meet Teresa, an alumna of our Data, Social Innovation, and Public Policy summer program, who turned her summer experience with PII into a thriving career in clinical research.",body:"María Teresa Ayllón González, DSIPP'22\n\n**When a simple recommendation from a professor leads to a complete career transformation, you know something special happened. Meet Teresa, an alumna of our Data, Social Innovation, and Public Policy summer program (formerly Health, Technology, and Society), who turned her summer experience with PII into a thriving career in clinical research, proving that the right guidance at the right time can open doors you never knew existed.**\n\nSince completing the program, Teresa has earned her Biomedicine degree, pursued two master's degrees, and landed her dream job in clinical research at OXON Epidemiology. But perhaps more impressively, she's built an entire career path around insights and connections made during just one transformative summer at The Public Innovation Institute.\n\n**What have you been up to since completing the summer program? Tell us about your current studies, work, or projects.**\n\nI finished my Biomedicine degree and moved onto doing 2 masters (one in Coordination and Monitoring Clinical Trials, and the other in Project Management). I am currently working as a Clinical Research Associate at OXON Epidemiology.\n\n**What compelled you to apply to the summer program and were there any surprises?**\n\nOne of my teachers from my Biomedicine degree believed it was a great opportunity and reality really exceeded my expectations. I thought it was going to be a much slower program and not so interactive, but it was a wonderful and exciting experience.\n\n**What has been the most surprising or unexpected development in your career or academic path since leaving the program?**\n\nI did my dissertation on AI in Public Health, applying that which I learnt during the program, and I had never thought of that. During the program, I got a lot of advice from my tutors, one being: \"Look up what Clinical Trial Monitoring is\". And so, I did and I ended up studying a Masters Degree for Coordinating and Monitoring Clinical Trials. And that is now my job!! I couldn't be happier.\n\n**How did working on your capstone or research project prepare you for the challenges you've encountered since?**\n\nI learned how to structure articles and essays in a cohesive way and found a way to research topics properly.\n\n**What advice would you give to students who are interested in the program?**\n\nTake in all of the classes. Ask questions. Enjoy your time especially during classes. You may not see it at the moment, but it will be useful in the future. Keep in contact with your mates and accept and take in all the different cultures.\n\n**What's one skill or mindset from the program that you still use today?**\n\nI use my tutor's critical thinking. The way she taught me how to structure my thoughts and lay things out in an orderly manner.\n\n**What are you most excited about right now academically, professionally, or personally?**\n\nI am excited for some programs I have been looking into, in order to grow within the company I work for. I have just moved to a different city (and it's my first place without my parents!) and I joined a Gaelic Football Club.\n\n**A Journey From Summer Program Worth Celebrating**\n\nTeresa's story exemplifies the ripple effect of quality education and mentorship. A casual piece of advice during the summer program, \"Look up what Clinical Trial Monitoring is,\" became the foundation of an entire career. Her dissertation on AI in Public Health bridged her program learning with emerging technologies, demonstrating how the Data, Social Innovation, and Public Policy curriculum continues to influence her work years later. The critical thinking framework she learned from her instructors remains central to how she approaches her professional responsibilities today.\n\nBeyond the technical skills and career direction, the summer program gave Teresa something equally valuable: a community. Her advice to prospective students emphasizes connections with instructors, peers, and with diverse perspectives, as much as it does academics. It's this holistic approach that transforms a summer of learning into years of impact.\n\nLearn more about our Data, Social Innovation, and Public Policy summer program at <a href=\"https://www.thepii.org/data-social-innovation-public-policy\" target=\"_blank\" rel=\"noopener\">www.thepii.org/data-social-innovation-public-policy</a>.",featured:false,section:"publications",tags:[],sourceUrl:"https://www.thepii.org/post/from-summer-student-to-clinical-research-professional-how-pii-s-summer-program-changed-everything"},
    {id:"justhealth-eu-funded-ai-healthcare",title:"PII Named Associate Partner in new €2 million EU-Funded Justice in Healthcare AI Initiative",author:"PII",affiliation:"The Public Innovation Institute",tag:"News",status:"published",date:"November 3, 2025",excerpt:"The Public Innovation Institute is named as an associate partner of the newly announced JustHealth project, a €2 million-funded initiative by the European Commission focused on ensuring social justice in healthcare.",body:"The Public Innovation Institute is named as an associate partner of the newly announced \"<a href=\"https://cordis.europa.eu/project/id/101227352\" target=\"_blank\" rel=\"noopener\">JustHealth</a>\" project, a €2 million-funded initiative by the European Commission focused on ensuring social justice in healthcare.\n\nThis initiative will see the launch of the first doctoral program in the EU specifically designed to ensure social justice in the development and deployment of AI in healthcare, under the theme JustHealth: Building a Decolonized Ethics and Governance Framework for Just and Trustworthy AI in Healthcare.\n\nThe project is now accepting applications for two fully funded Ph.D. positions at the University of Macerata in Italy: DC1 - AI Ethics will focus on developing, testing, and validating a decolonized ethics and governance framework for trustworthy AI in healthcare, with regard to ethical aspects (values and principles). DC2 - AI Governance (Policy and Regulation) will focus on developing, testing, and validating a decolonized ethics and governance framework for trustworthy AI in healthcare, with regard to governance aspects (policies and regulations). The start date for these two positions is September 1st 2026 for a duration of 36 months. Funding will be through the MCSA Doctoral Network Fellowship which provides a competitive salary and allowances for research and travel.\n\nSee the full call for applications <a href=\"https://www.unimc.it/en/research-bck/justhealth/2025-129044_all-1_fellowship-call-for-application_justhealth-2.pdf\" target=\"_blank\" rel=\"noopener\">here</a>.",featured:false,section:"publications",tags:["AI", "Digital Health", "AI Ethics"],sourceUrl:"https://www.thepii.org/post/pii-named-associate-partner-in-new-2-million-eu-funded-justice-in-healthcare-ai-initiative"},
    {id:"unga-80-climate-week-recap",title:"Recap: Rethinking Climate, Health, and Impact Metrics at UNGA 80 and Climate Week NYC",author:"Khahlil Louisy",authorBio:"Founder and Director of The Public Innovation Institute. Research affiliate at the Bloomberg Center for Cities, Harvard Kennedy School.",affiliation:"The Public Innovation Institute",tag:"Event",status:"published",date:"November 3, 2025",excerpt:"As global leaders gathered in New York for the 80th UN General Assembly and Climate Week NYC, a powerful consensus emerged: tackling climate change and public health must go hand in hand.",body:"*United Nations Headquarters, New York City*\n\nBy: Khahlil A, Louisy\n\nThis piece was originally published by the Data-Smart City Solutions Program at Harvard University. Read the full thing <a href=\"https://datasmart.hks.harvard.edu/rethinking-climate-health-impact-metrics\" target=\"_blank\" rel=\"noopener\">here</a>.\n\nAs global leaders gathered in New York for the 80th UN General Assembly and Climate Week NYC, a powerful consensus emerged: tackling climate change and public health must go hand in hand, demanding new metrics, investments, and solutions.\n\nNew York City became the epicenter of global climate action last month as the 80th United Nations General Assembly (UNGA) and Climate Week NYC converged to create what many described as a critical moment for assessing progress toward the Sustainable Development Goals. Under the theme \"Better together: 80 years and more for peace, development and human rights,\" UNGA 80 brought world leaders together September 23-29, while Climate Week NYC ran from September 21-28 with the theme \"Power On,\" highlighting the urgency of accelerating climate solutions.\n\nAmid discussions of clean energy transitions and climate finance, a powerful narrative emerged around the intersection of climate change and public health that demands fundamentally rethinking how we measure success and allocate resources. Global leaders, both in industry and among policymakers, are recognizing that there is a <a href=\"https://datasmart.hks.harvard.edu/about-community-data-health-initiative\" target=\"_blank\" rel=\"noopener\">tight link between health and climate</a>, and there is an urgent need for innovative solutions to tackle them together. Below are three key themes that will be critical to consider as we move forward.\n\n**Infrastructure is Part of a Healthy Environment**\n\nWhat: Leaders are now viewing buildings and infrastructure as not only energy consumers requiring efficiencies, but as critical health infrastructure that can either exacerbate or protect against climate health threats.\n\nWho: An all-women panel of senior leaders in sustainability including Heather Daniels, VP of Environment, Safety, Health and Sustainability at Lockheed Martin; Julia Gisewite, Chief Sustainability Officer at Turner Construction; Suzanne Felder, VP Global Impact and Sustainability at Prologis; and Holly Paeper, President, Trane Commercial HVAC Americas.\n\nHow: The business case for such \"healthy buildings\" requires metrics that capture both energy savings and health outcomes, from reduced respiratory illness due to better air quality to improved resilience during extreme heat events. The <a href=\"https://healthybuildings.hsph.harvard.edu/\" target=\"_blank\" rel=\"noopener\">Health Buildings initiative</a> at the Harvard TH Chan School of Public Health provides extensive research, tools, and guidance on improving human health both in, and through, the built environment. There are also real-world examples, such as the <a href=\"https://datasmart.hks.harvard.edu/clear-vision-nyc-clean-heat-plan\" target=\"_blank\" rel=\"noopener\">NYC Clean Heat program</a> that eliminated crude heating oils in buildings, and programs in Boston that <a href=\"https://datasmart.hks.harvard.edu/mitigating-childhood-asthma-how-boston-uses-data-and-outreach-address-historic-harms\" target=\"_blank\" rel=\"noopener\">engage medical professionals and home inspectors to reduce childhood asthma</a>.\n\n**New ROI Metrics Must Include Health**\n\nWhat: New impact metrics are emerging, as traditional return-on-investment frameworks struggle to capture the full value of climate-health interventions.\n\nWho: This theme came up at Global Citizen Impact Sessions, with former UN Secretary General Ban Ki-Moon, as well as sessions with Ursula Von Der Leyen, President of the European Commission; Julius Maada Bio, President of Sierra Leone, Jennifer Geerlings-Simons, President of Suriname, and Ilan Goldfajn, President of the Inter-American Development Bank.\n\nHow: Many discussions focused on developing new metrics that account for, first....\n\n<a href=\"https://datasmart.hks.harvard.edu/rethinking-climate-health-impact-metrics\" target=\"_blank\" rel=\"noopener\">Continue reading here</a>",featured:false,section:"publications",tags:["Climate", "Health", "United Nations", "Climate Week", "Metrics"],sourceUrl:"https://www.thepii.org/post/recap-rethinking-climate-health-and-impact-metrics-at-unga-80-and-climate-week-nyc"},
    {id:"pii-joins-ethicai4care-project",title:"PII joins EthicAI4CARE Project",author:"PII",affiliation:"The Public Innovation Institute",tag:"News",status:"published",date:"October 27, 2025",excerpt:"The European Commission–funded EthicAI4CARE project has launched to promote ethical AI in healthcare. PII's Director of AI and Technology Ethics, Dr. Simona Tiribelli, will help design a framework for trustworthy healthcare AI.",body:"The EthicAI4CARE Implementing Ethics by Design in AI: A Training Framework for the Healthcare Sector project, funded by the European Commission, has officially launched. The initiative brings together a consortium of seven leading universities and organizations to advance ethical AI implementation in healthcare. Coordinated by the University of Macerata in Italy, project partners include the University of Helsinki, Tallinn University of Technology, University of Ghent, University of Porto, and the University of Amsterdam (UvA).\n\nAs an associated partner, the Public Innovation Institute (PII) will help test the ethics and legal framework, along with a self-assessment tool for trustworthy AI, across diverse healthcare use cases in collaboration with companies and non-academic stakeholders.\n\nWith €400,000 in funding, EthicAI4CARE will develop a training framework that promotes digital literacy and ethical decision-making in the use of AI within healthcare systems. The project aligns with the European Commission's Digital Strategy for Europe 2030, supporting the broader goal of fostering trustworthy, human-centered AI across Europe's health sector.\n\nThe project runs through 2027.",featured:false,section:"publications",tags:["AI", "Digital Health", "AI Ethics"],sourceUrl:"https://www.thepii.org/post/pii-s-director-of-ai-and-technology-ethics-joins-ethicai4care-project"}
