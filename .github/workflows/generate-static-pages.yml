name: Generate static post pages

# Keeps static HTML (with real OG/meta tags) for every post AND every
# top-level content page in sync with whatever's in Supabase, so shared
# links get correct previews on LinkedIn, Facebook, etc., and bots/crawlers
# get real content instead of a 404 — even though this is otherwise a
# client-rendered SPA on GitHub Pages.
#
# Runs:
#   - on every push to main (any file change — a push is a good signal
#     something on the site may have changed)
#   - hourly, to pick up posts published from the CMS without a git push
#     (CMS writes straight to Supabase, so most publishing never touches
#     this repo directly)
#   - manually, via the Actions tab ("Run workflow")
#
# Note: this workflow's own commits (made with the default GITHUB_TOKEN)
# do not re-trigger push-based workflow runs — that's a built-in GitHub
# safeguard, not something configured here — so this cannot loop itself.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate static pages
        run: node scripts/generate-static-pages.js

      - name: Commit changes if any
        run: |
          git config user.name "pii-static-pages-bot"
          git config user.email "actions@github.com"
          git add research publications programs cail hyperion conference about team opportunities contact sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Regenerate static pages [automated]"
            git push
          fi
